<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .kontener {
            display: grid;
            grid-template-areas: 
                header header
                aside main
                footer footer;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 100px auto 100px;
            gap: 20px;
        }
        div header {
            grid-column: 1 / 3;
            background-color: #FBEFEF;
        }
        div aside {
            grid-column: 1 / 2;
            background-color: #F9DFDF;
        }
        div main {
            grid-column: 2 / 3;
            background-color: #F9DFDF;
        }
        div footer {
            grid-column: 1 / 3;
            background-color: #F5AFAF;
            align-self: center;
        }
        header, aside, main, footer {
            border: 1px dotted black;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="kontener">
        <header><h1>Nagłówek</h1></header>
        <aside><b>Panel</b><ul>
            <li>Link 1</li>
            <li>Link 2</li>
            <li>Link 3</li>
        </ul></aside>
        <main><h2>Główna zawartość</h2><p>To jest główna treść strony. Tutaj znajduje się najważniejsza zawartość</p></main>
        <footer>Stopka © 2026</footer>
    </div>
</body>
</html>
