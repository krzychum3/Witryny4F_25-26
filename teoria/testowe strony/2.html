<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pylon</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #ccc;
    font-family: Arial, sans-serif;
}

/* CAŁY PYLON */
.pylon {
    width: 260px;
    background: white;
    border: 2px solid black;
}

/* GÓRA */
.delta-oil {
    background: red;
    color: blue;
    text-align: center;
    padding: 20px 0;
    font-weight: bold;
}

/* BIAŁY PAS */
.bialy {
    background: #ddd;
    height: 40px;
}

/* SKLEP */
.sklep {
    background: red;
    color: black;
    text-align: center;
    padding: 15px 0;
    font-weight: bold;
}

/* SEKCJA CEN */
.cena {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: red;
    color: white;
    padding: 10px;
    border-top: 2px solid #222;
}

.paliwo {
    font-weight: bold;
}

.kwota {
    font-family: "Courier New", monospace;
    font-size: 20px;
}

/* IKONY / DÓŁ */
.dol {
    background: red;
    padding: 10px;
    display: flex;
    justify-content: space-around;
    color: white;
}

/* STOPKA */
.stopka {
    background: red;
    height: 60px;
}
</style>

</head>
<body>

<div class="pylon">

    <div class="delta-oil">DELTA OIL</div>
    <div class="bialy"></div>
    <div class="sklep">SKLEP</div>

    <div class="cena">
        <span class="paliwo">95</span>
        <span class="kwota">5.60</span>
    </div>

    <div class="cena">
        <span class="paliwo">ON</span>
        <span class="kwota">5.60</span>
    </div>

    <div class="cena">
        <span class="paliwo">98</span>
        <span class="kwota">5.60</span>
    </div>

    <div class="cena">
        <span class="paliwo">LPG</span>
        <span class="kwota">5.60</span>
    </div>

    <div class="dol">
        <span>⛽</span>
        <span>🌍</span>
        <span>🚗</span>
        <span>WC</span>
    </div>

    <div class="stopka"></div>

</div>

</body>
</html>
