<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            background-color: rgb(73, 72, 72);
            color: white;
            align-items: center;
            justify-items: center;
            height: 60px;
        }

        .kontener {
            display: grid;
            grid-template-columns: 3fr 1fr;
        }

        div main {
            width: min(300px), max(800px);

        }

        div aside {
            background-color: rgb(184, 177, 177);
            padding: min(1rem), max(3rem);
        }
    </style>
</head>

<body>
    <header>
        <h1>HEADER</h1>
    </header>
    <div class="kontener">
        <main>MAIN CONTENT<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Magni non dignissimos obcaecati,
                voluptate laboriosam nihil sunt aliquid veritatis cupiditate amet!</p>
        </main>
        <aside>ASIDE</aside>
    </div>
</body>

</html>
