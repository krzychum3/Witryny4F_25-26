<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
        }
        aside {
            background-color: rgb(20, 58, 88);
            color: white;
            width: 250px;
            height: 100vh;
            padding: 10px;
        }
        main {
            flex-grow: 1;
            padding: 40px;
        }
        .galeria {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .galeria img {
            background-color: rgb(49, 46, 46);
            width: 30%;
            height: 400px;
            opacity: 1;
            transition: opacity 0.5s;
        }
        img:hover {
            opacity: 0.5;
            
        }
    </style>
</head>
<body>
        <aside>
            <h2>Photogallery</h2>
            <p><u>Góry</u> <u>Morze</u> <u>Miasto</u></p>
        </aside>

        <main>
            <h1>Galeria</h1>
            <div class="galeria">
                <img src="góry.webp">
                <img src="morze.jpg">
                <img src="ulica.jpg">
            </div>

        </main>
</body>
</html>
