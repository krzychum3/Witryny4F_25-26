<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
        }
        aside {
            background-color: rgb(20, 58, 88);
            color: white;
            width: 250px;
            height: 100vh;
            padding: 10px;
        }
        main {
            flex-grow: 1;
            padding: 40px;
        }
        .galeria {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .galeria img {
            width: 100%;
            height: 400px;
        }
        .obrazek {
            position: relative;
            width: 30%;
        }
        .overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            opacity: 0;
            transition: 0.5s;
        }
        .obrazek:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
        <aside>
            <h2>Photogallery</h2>
            <p><u>Góry</u> <u>Morze</u> <u>Miasto</u></p>
        </aside>

        <main>
            <h1>Galeria</h1>
            <div class="galeria">
                <div class="obrazek">
                    <img src="góry.webp">
                    <div class="overlay">Mount Everest</div>
                </div>
                <div class="obrazek">
                    <img src="morze.jpg">
                    <div class="overlay">Morze</div>
                </div>
                <div class="obrazek">
                    <img src="ulica.jpg">
                    <div class="overlay">Miasto</div>
                </div>
            </div>
        </main>
</body>
</html>
